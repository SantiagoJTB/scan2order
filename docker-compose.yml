version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: scan2order
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=scan2order
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - APP_ENV=local
      - APP_DEBUG=true
    entrypoint: ["sh","-c","cp /var/www/html/.env.example /var/www/html/.env && php artisan key:generate --force && chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache && php-fpm"]
    ports:
      - "9000:9000"
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    command: sh -c "npm install && npm run build && sleep infinity"
    depends_on:
      - backend

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - frontend_dist:/usr/share/nginx/html

volumes:
  pgdata:
  frontend_dist:
