version: '3.9'

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: scan2order-mailpit
    ports:
      - "127.0.0.1:8025:8025"

  db:
    image: postgres:15-alpine
    container_name: scan2order-db
    environment:
      POSTGRES_DB: scan2order
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: scan2order-backend
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=scan2order
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://192.168.1.132:8080
    entrypoint: ["sh","-c","cp /var/www/html/.env.example /var/www/html/.env && php artisan key:generate --force && php artisan migrate --force && php artisan storage:link --force && chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache && php-fpm"]
    ports:
      - "9000:9000"
    depends_on:
      mailpit:
        condition: service_started
      db:
        condition: service_healthy

  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: scan2order-scheduler
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=scan2order
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://192.168.1.132:8080
    entrypoint: ["sh","-c","until [ -f /var/www/html/.env ]; do echo 'Waiting for backend .env...'; sleep 2; done; php artisan schedule:work"]
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: scan2order-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    command: sh -c "until nc -z backend 9000; do echo 'Waiting for backend on :9000...'; sleep 2; done; npm install && npm run build"
    depends_on:
      backend:
        condition: service_started

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: scan2order-nginx
    ports:
      - "0.0.0.0:8080:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./backend/storage/app/public:/var/www/html/public/storage:ro

volumes:
  pgdata:
  frontend_dist:
