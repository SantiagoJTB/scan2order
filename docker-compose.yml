version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: scan2order-db
    environment:
      POSTGRES_DB: scan2order
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: scan2order-backend
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=scan2order
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
    entrypoint: ["sh","-c","cp /var/www/html/.env.example /var/www/html/.env && php artisan key:generate --force && php artisan migrate --force && chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache && php-fpm"]
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: scan2order-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    command: sh -c "npm install && npm run build"
    depends_on:
      - backend

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: scan2order-nginx
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro

volumes:
  pgdata:
  frontend_dist:
