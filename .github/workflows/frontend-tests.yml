name: Frontend Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:
    inputs:
      run_e2e_real:
        description: 'Run real backend E2E flow (docker + backend persistence)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 3 * * *'

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit/component tests
        run: npm run test

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  e2e-real:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_e2e_real == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start docker services
        run: docker compose up -d

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/api/hello > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 5
          done
          echo "API did not become ready in time"
          exit 1

      - name: Run real-backend E2E flow
        working-directory: frontend
        env:
          VITE_API_PROXY_TARGET: http://localhost:8080
        run: npm run test:e2e -- tests/e2e/order-flow-real-backend.spec.js

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e-real
          path: frontend/playwright-report

      - name: Stop docker services
        if: always()
        run: docker compose down -v
